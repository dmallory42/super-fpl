name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite, sqlite3
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install PHP dependencies
        run: composer install --working-dir=api --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: HUSKY=0 npm ci

      - name: Run all test suites
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          passphrase: ${{ secrets.STAGING_SSH_PASSPHRASE }}
          port: ${{ secrets.STAGING_PORT || '22' }}
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.STAGING_APP_DIR || '/opt/superfpl' }}"
            export ENV_FILE=".env.staging"
            bash "$APP_DIR/deploy/deploy-prod.sh"
