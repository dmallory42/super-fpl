limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_expensive:10m rate=2r/s;
limit_req_status 429;

server {
    listen 80;
    server_name superfpl.com www.superfpl.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name superfpl.com www.superfpl.com;
    root /var/www/html/frontend/dist;
    index index.html;
    error_page 429 = @rate_limited;

    # SSL config (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/superfpl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/superfpl.com/privkey.pem;

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Stricter limits for expensive endpoints.
    location ~ ^/api/(predictions|leagues|planner/optimize) {
        limit_req zone=api_expensive burst=4 nodelay;
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # General API rate limiting.
    location /api {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location @rate_limited {
        default_type application/json;
        add_header Retry-After "1" always;
        return 429 '{"error":"Too Many Requests"}';
    }
}
