services:
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "8080:80"
    volumes:
      - ./api/public:/var/www/html/api/public
      - ./deploy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: deploy/Dockerfile.php
    volumes:
      - ../maia:/var/www/maia
      - ./packages:/var/www/html/packages
      - ./api:/var/www/html/api
    working_dir: /var/www/html/api
    environment:
      - ODDS_API_KEY=${ODDS_API_KEY:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - redis

  cron:
    build:
      context: .
      dockerfile: deploy/Dockerfile.php
    volumes:
      - ../maia:/var/www/maia
      - ./packages:/var/www/html/packages
      - ./api:/var/www/html/api
    working_dir: /var/www/html/api
    environment:
      - ODDS_API_KEY=${ODDS_API_KEY:-}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - redis
    command: ["crond", "-f", "-l", "2"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
